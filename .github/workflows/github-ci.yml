  Deploy:
    needs: Test
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Create usr/bin directory
        run: mkdir -p usr/bin
        working-directory: .

      - name: Download binary from artifact
        uses: actions/download-artifact@v4
        with:
          name: latin-checker-binary
          path: usr/bin

      - name: Build package (without external script)
        run: |
          # Создаём структуру пакета
          mkdir -p latin-checker_1.0_amd64/DEBIAN
          mkdir -p latin-checker_1.0_amd64/usr/bin

          # Копируем бинарник
          cp usr/bin/latin-checker latin-checker_1.0_amd64/usr/bin/

          # Формируем control-файл
          cat > latin-checker_1.0_amd64/DEBIAN/control <<EOF
          Package: latin-checker
          Version: 1.0
          Architecture: amd64
          Maintainer: Your Name <your.email@example.com>
          Description: Latin text checker
           A tool for checking Latin texts.
          EOF

          # Собираем .deb пакет
          dpkg-deb --build latin-checker_1.0_amd64

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: latin-checker-deb-package
          path: latin-checker_1.0_amd64.deb
